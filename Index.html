<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI HOSHINO GENERATOR - NARA STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d0d12; color: #fff; font-family: sans-serif; padding: 20px; }
        .gen-card { background: #16161a; border: 2px solid #ff4081; border-radius: 20px; padding: 20px; max-width: 500px; margin: auto; text-align: center; }
        .email-box { background: #000; padding: 10px; border-radius: 10px; color: #00ff88; margin: 15px 0; font-weight: bold; border: 1px solid #333; }
        .btn-gen { background: linear-gradient(45deg, #ff4081, #9c27b0); border: none; color: white; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; }
        /* TEMPAT INBOX MUNCUL */
        #inboxArea { display: none; margin-top: 20px; border: 2px solid #333; border-radius: 10px; overflow: hidden; width: 100%; height: 500px; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="gen-card">
        <h4>Ai Hoshino Login</h4>
        <div class="email-box" id="res">KLIK GENERATE...</div>
        <button class="btn-gen" onclick="buat()">GENERATE & CEK INBOX</button>
        
        <div id="inboxArea">
            <iframe id="mailFrame" src=""></iframe>
        </div>
    </div>

    <script>
        function buat() {
            const email = 'nara' + Math.floor(Math.random() * 900000 + 100000) + '@fexpost.com';
            document.getElementById('res').innerText = email;
            
            // Masukin web email ke dalem kotak (iframe)
            const frame = document.getElementById('mailFrame');
            frame.src = "https://generator.email/" + email;
            
            // Tampilin kotaknya
            document.getElementById('inboxArea').style.display = "block";
            
            // Salin otomatis biar cepet
            navigator.clipboard.writeText(email);
            alert("Email disalin! Tempel di AM sekarang.");
        }
    </script>
</body>
</html>
