<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI HOSHINO LOGIN - NARA STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap');
        body { background-color: #0d0d12; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .gen-card { background: #16161a; border: 2px solid #ff4081; border-radius: 25px; padding: 25px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 0 20px rgba(255, 64, 129, 0.3); }
        .email-box { background: #000; padding: 15px; border-radius: 12px; font-weight: bold; color: #00ff88; margin: 15px 0; border: 1px solid #333; word-break: break-all; font-size: 1.1rem; }
        .btn-gen { background: linear-gradient(45deg, #ff4081, #9c27b0); border: none; color: white; font-weight: 800; width: 100%; padding: 14px; border-radius: 12px; margin-bottom: 12px; transition: 0.3s; }
        .btn-gen:active { transform: scale(0.95); }
        .btn-copy { border: 1px solid #fff; color: white; width: 100%; padding: 10px; border-radius: 12px; background: transparent; margin-bottom: 20px; }
        /* TOMBOL INI WAJIB MUNCUL PAS DI-CLICK */
        #btnInbox { background: #25d366; color: white; font-weight: 800; width: 100%; padding: 14px; border-radius: 12px; display: none; text-decoration: none; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); }
    </style>
</head>
<body>
    <div class="gen-card">
        <h4 style="font-weight: 800; margin-bottom: 5px;">Ai Hoshino Login</h4>
        <p style="color: #888; font-size: 0.9rem;">Generator Email Login AM Premium</p>
        
        <div class="email-box" id="emailRes">GENERATE DULU...</div>
        
        <button class="btn-gen" onclick="buatEmail()">GENERATE EMAIL</button>
        <button class="btn-copy" onclick="salin()">Salin Email</button>
        
        <a href="#" id="btnInbox" target="_blank">BUKA KOTAK MASUK</a>
        
        <p style="font-size: 0.7rem; color: #555; margin-top: 20px;">Klik "Generate" lalu buka AM, baru klik tombol Hijau.</p>
    </div>

    <script>
        function buatEmail() {
            // Pakai domain @fexpost.com biar lebih kenceng masuknya
            const randomAngka = Math.floor(Math.random() * 900000 + 100000);
            const emailFix = 'nara' + randomAngka + '@fexpost.com';
            
            // Tampilkan di layar
            document.getElementById('emailRes').innerText = emailFix;
            
            // Siapkan link inbox
            const linkInbox = "https://generator.email/" + emailFix;
            const tombolHijau = document.getElementById('btnInbox');
            
            tombolHijau.href = linkInbox;
            tombolHijau.style.display = "block"; // INI BIAR TOMBOL HIJAU MUNCUL
        }

        function salin() {
            const teks = document.getElementById('emailRes').innerText;
            if(teks.includes('GENERATE')) return alert('Klik Generate dulu, Hiro!');
            navigator.clipboard.writeText(teks).then(() => {
                alert('Email ' + teks + ' berhasil disalin!');
            });
        }
    </script>
</body>
</html>
